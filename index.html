<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Keuangan Pribadi Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome untuk ikon agar UI lebih interaktif -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2><i class="fa-solid fa-wallet text-primary"></i> FinTrack Pro</h2>
        
        <!-- Live Exchange Rate Widget (Added Value Integrasi API Publik) -->
        <div class="rate-card">
            <div>
                <span class="rate-title"><i class="fa-solid fa-chart-line"></i> Info Kurs Hari Ini (USD ke IDR)</span>
                <div class="rate-value" id="kursUSD">Memuat data...</div>
            </div>
            <i class="fa-solid fa-globe rate-icon"></i>
        </div>

        <!-- Dashboard Ringkasan Finansial -->
        <div class="dashboard-grid">
            <div class="card card-total">
                <span class="card-title">Total Pengeluaran</span>
                <span class="card-value" id="totalPengeluaran">Rp 0</span>
            </div>
            <div class="card card-count">
                <span class="card-title">Jumlah Transaksi</span>
                <span class="card-value" id="jumlahTransaksi">0</span>
            </div>
        </div>
        
        <!-- Form Input -->
        <form id="formTransaksi">
            <h3><i class="fa-solid fa-plus-circle"></i> Tambah Transaksi Baru</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="tanggal">Tanggal</label>
                    <input type="date" id="tanggal" required>
                </div>

                <div class="form-group">
                    <label for="kategori">Kategori</label>
                    <select id="kategori">
                        <option value="Makanan">🍱 Makanan</option>
                        <option value="Transportasi">🚗 Transportasi</option>
                        <option value="Hiburan">🎬 Hiburan</option>
                        <option value="Lainnya">📦 Lainnya</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="deskripsi">Deskripsi</label>
                <input type="text" id="deskripsi" placeholder="Contoh: Makan siang bareng teman">
            </div>

            <div class="form-group">
                <label for="nominal">Nominal (Rp)</label>
                <input type="number" id="nominal" placeholder="Masukkan jumlah nominal" required>
            </div>

            <button type="submit"><i class="fa-solid fa-paper-plane"></i> Simpan Transaksi</button>
        </form>

        <!-- Bagian Filter & List Data -->
        <div class="list-header">
            <h3><i class="fa-solid fa-history"></i> Riwayat Transaksi</h3>
            <select id="filterKategori" class="filter-select">
                <option value="Semua">Semua Kategori</option>
                <option value="Makanan">Makanan</option>
                <option value="Transportasi">Transportasi</option>
                <option value="Hiburan">Hiburan</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>
        
        <div id="daftarTransaksi"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
